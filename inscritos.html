    * {

      padding: 0;
      box-sizing: border-box;
    }

    body {

      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 50%, #0f1a2b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
      color: #f0f2f8;
    }

    /* --- LOGIN OVERLAY --- */
    #loginOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(14px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loginOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .login-box {
      background: rgba(20, 30, 55, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      padding: 40px 32px 48px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
      text-align: center;
    }

    .login-box h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-box .sub {
      color: #8d9ae0;
      font-size: 0.9rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .login-box input {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 16px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.25s;
    }

    .login-box input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.25);
    }

    .login-box input::placeholder {
      color: #6a78a0;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #0b0e1a;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 28px rgba(79, 172, 254, 0.3);
      margin-top: 8px;
    }

    .login-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 36px rgba(79, 172, 254, 0.5);
    }

    .login-error {
      color: #f5576c;
      font-size: 0.9rem;
      margin-top: 14px;
      min-height: 24px;
    }

    /* --- APP (conteúdo principal) --- */
    .app-container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 16px 4px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .header-actions .counter {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cdd4f0;
      white-space: nowrap;
    }

    .btn-emails {
      background: rgba(79, 172, 254, 0.15);
      border: 1px solid rgba(79, 172, 254, 0.3);
      color: #7aa9ff;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-emails:hover {
      background: rgba(79, 172, 254, 0.25);
      border-color: #4facfe;
      transform: scale(1.02);
    }

    .carousel-wrapper {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.8);
      background: rgba(18, 25, 45, 0.6);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
      cursor: grab;
      touch-action: none;
    }

    .carousel-track.dragging {
      cursor: grabbing;
      transition: none;
    }

    .card {
      flex: 0 0 100%;
      padding: 24px 20px 28px;
      min-height: 480px;
      max-height: 80vh;
      overflow-y: auto;
      background: transparent;
      color: #eef1fa;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
    }

    .card::-webkit-scrollbar {
      width: 4px;
    }
    .card::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 2.2fr;
      gap: 6px 14px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .card-grid .label {
      font-weight: 600;
      color: #8d9ae0;
      letter-spacing: 0.3px;
      font-size: 0.8rem;
      text-transform: uppercase;
      opacity: 0.8;
      padding-top: 2px;
    }

    .card-grid .value {
      color: #f0f4ff;
      word-break: break-word;
      overflow-wrap: break-word;
      font-weight: 400;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .card-grid .value a {
      color: #7aa9ff;
      text-decoration: none;
      word-break: break-all;
    }
    .card-grid .value a:hover {
      text-decoration: underline;
    }

    .card-grid .full-row {
      grid-column: 1 / -1;
    }

    .card-grid .bio-text {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 14px;
      border-radius: 14px;
      border-left: 3px solid #f5576c;
      margin-top: 4px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #d6defa;
    }

    .copy-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px 0;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #0b0e1a;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(79, 172, 254, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .copy-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 32px rgba(79, 172, 254, 0.4);
    }
    .copy-btn:active {
      transform: scale(0.97);
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s ease;
      opacity: 0.6;
      user-select: none;
    }

    .nav-arrow:hover {
      opacity: 1;
      background: rgba(79, 172, 254, 0.3);
      border-color: rgba(79, 172, 254, 0.4);
    }

    .nav-arrow.prev {
      left: 8px;
    }
    .nav-arrow.next {
      right: 8px;
    }

    @media (max-width: 480px) {
      .nav-arrow {
        width: 32px;
        height: 32px;
        font-size: 0.9rem;
      }
      .nav-arrow.prev {
        left: 4px;
      }
      .nav-arrow.next {
        right: 4px;
      }
    }

    .dots-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 18px 0 4px;
      flex-wrap: wrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }

    .dot.active {
      background: #4facfe;
      width: 28px;
      border-radius: 20px;
      box-shadow: 0 0 16px rgba(79, 172, 254, 0.5);
    }

    .dot:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(10, 20, 40, 0.9);
      backdrop-filter: blur(12px);
      padding: 14px 32px;
      border-radius: 60px;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {

        min-height: 420px;
        max-height: 75vh;

        gap: 4px 10px;

      .header h1 {
        font-size: 1.1rem;
      }

        font-size: 0.9rem;
        padding: 12px 0;

      .toast {

        padding: 12px 24px;

      pointer-events: auto;

      float: right;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #aab4d6;
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 8px;
      border-radius: 40px;

      background: rgba(255, 255, 255, 0.1);

      padding: 0;
      margin: 16px 0 20px;

      align-items: center;
      padding: 12px 0;

      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;

    .email-list li .copy-email-btn:hover {
      background: rgba(79, 172, 254, 0.25);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(255, 255, 255, 0.06);
      color: #cdd4f0;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .modal-actions button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .modal-actions .copy-all-btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #0b0e1a;
      border: none;
    }

    .modal-actions .copy-all-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(79, 172, 254, 0.3);
    }
  </style>
</head>

    // ================================================================
    // 3. LOGIN + FIREBASE ALERT
    // ================================================================
    const loginOverlay = document.getElementById('loginOverlay');
    const loginBtn = document.getElementById('loginBtn');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginError = document.getElementById('loginError');
    const appContainer = document.getElementById('appContainer');

    const VALID_USER = 'admin';
    const VALID_PASS = 'parada2026';

    async function registerLoginToFirebase(username) {
      if (!firebaseReady || !db) return;
      try {
        const logRef = ref(db, 'acessos');
        await push(logRef, {
          usuario: username,
          timestamp: serverTimestamp(),
          userAgent: navigator.userAgent,
          ip: '(não disponível no cliente)'
        });
        console.log('✅ Login registrado no Firebase.');
      } catch (err) {
        console.error('❌ Erro ao registrar login:', err);
      }
    }

    function doLogin() {
      const user = loginUser.value.trim();
      const pass = loginPass.value.trim();
      if (user === VALID_USER && pass === VALID_PASS) {
        loginError.textContent = '';
        registerLoginToFirebase(user);
        loginOverlay.classList.add('hidden');
        appContainer.style.display = 'block';
        if (!window._carouselInited) {
          initCarousel();
          window._carouselInited = true;
        }
      } else {
        loginError.textContent = '❌ Usuário ou senha inválidos.';
        loginPass.value = '';
        loginPass.focus();
      }
    }

    loginBtn.addEventListener('click', doLogin);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !loginOverlay.classList.contains('hidden')) {
        doLogin();
      }
    });
    loginPass.focus();

    // ================================================================
    // 4. CARROSSEL
    // ================================================================
    let currentIndex = 0;
    const total = artists.length;
    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('dotsContainer');
    const counter = document.getElementById('counter');

    // Função auxiliar para criar link do Instagram
    function getInstagramLink(value) {
      if (!value) return '';
      if (value.startsWith('http')) return value; // já é URL
      // remove @ se tiver
      const clean = value.replace(/^@/, '');
      if (clean.trim() === '') return '';
      return `https://instagram.com/${clean}`;
    }

    function buildCards() {
      track.innerHTML = '';
      artists.forEach((artist, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;

        const fields = [
          { label: 'Nome', key: 'nome' },
          { label: 'Nome Artístico', key: 'nomeArtistico' },
          { label: 'Cidade', key: 'cidade' },
          { label: 'Data Inscrição', key: 'dataHora' },
          { label: 'E-mail', key: 'email' },
          { label: 'Telefone', key: 'telefone' },
          { label: 'Nascimento', key: 'nascimento' },
          { label: 'Gênero Musical', key: 'genero' },
          { label: 'Tipo Apresentação', key: 'tipoApresentacao' },
          { label: 'Músicas', key: 'musicas' },
          { label: 'Instagram', key: 'instagram' },
          { label: 'TikTok', key: 'tiktok' },
          { label: 'Spotify', key: 'spotify' },
          { label: 'YouTube', key: 'youtube' },
          { label: 'Portfolio', key: 'portfolioLink' },
        ];

        if (artist.tempoApresentacao) {
          fields.push({ label: 'Tempo de Apresentação', key: 'tempoApresentacao' });
        }

        let gridHTML = '<div class="card-grid">';
        fields.forEach(f => {
          let value = artist[f.key] || '';
          // Tratamento especial para Instagram: transformar em link
          if (f.key === 'instagram' && value) {
            const link = getInstagramLink(value);
            if (link) {
              value = `<a href="${link}" target="_blank" rel="noopener">${value}</a>`;
            }
          } else if ((f.key === 'spotify' || f.key === 'portfolioLink' || f.key === 'youtube') && value.startsWith('http')) {
            value = `<a href="${value}" target="_blank" rel="noopener">${value}</a>`;
          }
          if (value) {
            gridHTML += `
                <div class="label">${f.label}</div>
                <div class="value">${value}</div>
              `;
          }
        });

        if (artist.bio && artist.bio !== 'Não informado') {
          gridHTML += `
              <div class="full-row">
                <div class="label" style="margin-top:8px;">Bio</div>
                <div class="bio-text">${artist.bio}</div>
              </div>
            `;
        }
        gridHTML += '</div>';

        const copyBtn = `
            <button class="copy-btn" data-index="${index}">
              📋 Copiar Informações
            </button>
          `;
        card.innerHTML = gridHTML + copyBtn;
        track.appendChild(card);
      });

      dotsContainer.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.dataset.index = i;
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      }
    }

    function getTrackWidth() {
      return track.offsetWidth || document.getElementById('carouselWrapper').offsetWidth;
    }

    function getTransform() {
      return -currentIndex * 100;
    }

    function updateSlide(animate = true) {
      if (!animate) {
        track.style.transition = 'none';
      } else {
        track.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      }
      track.style.transform = `translateX(${getTransform()}%)`;
      if (animate) void track.offsetHeight;
      track.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

      counter.textContent = `${currentIndex + 1} / ${total}`;
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function goTo(index) {
      if (index < 0) index = 0;
      if (index >= total) index = total - 1;
      if (index === currentIndex) return;
      currentIndex = index;
      updateSlide(true);
    }

    function next() { goTo(currentIndex + 1); }

    function prev() { goTo(currentIndex - 1); }

    let startX = 0,
      currentX = 0,
      isDragging = false,
      startTransform = 0;

    function onTouchStart(e) {
      const touch = e.touches[0];
      startX = touch.clientX;
      currentX = startX;
      isDragging = true;
      startTransform = getTransform();
      track.style.transition = 'none';
      track.classList.add('dragging');
    }

    function onTouchMove(e) {
      if (!isDragging) return;
      const touch = e.touches[0];
      const deltaX = touch.clientX - startX;
      const percentDelta = (deltaX / getTrackWidth()) * 100;
      let newTransform = startTransform + percentDelta;
      const maxLimit = 0;
      const minLimit = -(total - 1) * 100;
      if (newTransform > maxLimit + 5) newTransform = maxLimit + 5;
      if (newTransform < minLimit - 5) newTransform = minLimit - 5;
      track.style.transform = `translateX(${newTransform}%)`;
      currentX = touch.clientX;
      e.preventDefault();
    }

    function onTouchEnd() {
      if (!isDragging) return;
      isDragging = false;
      track.classList.remove('dragging');
      const deltaX = currentX - startX;
      const threshold = getTrackWidth() * 0.25;
      if (deltaX < -threshold && currentIndex < total - 1) currentIndex++;
      else if (deltaX > threshold && currentIndex > 0) currentIndex--;
      updateSlide(true);
    }

    function onMouseDown(e) {
      if (e.button !== 0) return;
      startX = e.clientX;
      currentX = startX;
      isDragging = true;
      startTransform = getTransform();
      track.style.transition = 'none';
      track.classList.add('dragging');
      e.preventDefault();
    }

    function onMouseMove(e) {
      if (!isDragging) return;
      const deltaX = e.clientX - startX;
      const percentDelta = (deltaX / getTrackWidth()) * 100;
      let newTransform = startTransform + percentDelta;
      const maxLimit = 0;
      const minLimit = -(total - 1) * 100;
      if (newTransform > maxLimit + 5) newTransform = maxLimit + 5;
      if (newTransform < minLimit - 5) newTransform = minLimit - 5;
      track.style.transform = `translateX(${newTransform}%)`;
      currentX = e.clientX;
    }

    function onMouseUp() {
      if (!isDragging) return;
      isDragging = false;
      track.classList.remove('dragging');
      const deltaX = currentX - startX;
      const threshold = getTrackWidth() * 0.25;
      if (deltaX < -threshold && currentIndex < total - 1) currentIndex++;
      else if (deltaX > threshold && currentIndex > 0) currentIndex--;
      updateSlide(true);
    }

    function initCarousel() {
      buildCards();
      track.style.transition = 'none';
      track.style.transform = 'translateX(0%)';
      void track.offsetHeight;
      track.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      updateSlide(true);

      const wrapper = document.getElementById('carouselWrapper');

      track.addEventListener('touchstart', onTouchStart, { passive: false });
      track.addEventListener('touchmove', onTouchMove, { passive: false });
      track.addEventListener('touchend', onTouchEnd, { passive: false });
      track.addEventListener('touchcancel', onTouchEnd, { passive: false });

      track.addEventListener('mousedown', onMouseDown);
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
      wrapper.addEventListener('mouseleave', () => {
        if (isDragging) {
          isDragging = false;
          track.classList.remove('dragging');
          updateSlide(true);
        }
      });

      document.getElementById('prevBtn').addEventListener('click', prev);
      document.getElementById('nextBtn').addEventListener('click', next);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'ArrowRight') next();
      });

      // Copy
      track.addEventListener('click', (e) => {
        const btn = e.target.closest('.copy-btn');
        if (!btn) return;
        const index = parseInt(btn.dataset.index, 10);
        const artist = artists[index];
        const text = formatArtistForCopy(artist, index);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => showToast('✅ Informações copiadas!'))
            .catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => updateSlide(true), 150);
      });
    }

    function formatArtistForCopy(artist, index) {
      const lines = [];
      lines.push(`🎤 ARTISTA ${index + 1}/${total}`);
      lines.push('--------------------------------');
      const map = [
        ['Nome', artist.nome],
        ['Nome Artístico', artist.nomeArtistico],
        ['Cidade', artist.cidade],
        ['Data Inscrição', artist.dataHora],
        ['E-mail', artist.email],
        ['Telefone', artist.telefone],
        ['Nascimento', artist.nascimento],
        ['Gênero Musical', artist.genero],
        ['Tipo Apresentação', artist.tipoApresentacao],
        ['Músicas', artist.musicas],
        ['Instagram', artist.instagram],
        ['TikTok', artist.tiktok],
        ['Spotify', artist.spotify],
        ['YouTube', artist.youtube],
        ['Portfolio', artist.portfolioLink],
      ];
      if (artist.tempoApresentacao) map.push(['Tempo de Apresentação', artist.tempoApresentacao]);
      map.forEach(([label, value]) => {
        if (value && value.trim() !== '') lines.push(`${label}: ${value}`);
      });
      if (artist.bio && artist.bio !== 'Não informado') lines.push(`Bio: ${artist.bio}`);
      return lines.join('\n');
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast('✅ Informações copiadas!');
      } catch (e) {
        showToast('❌ Erro ao copiar.');
      }
      document.body.removeChild(ta);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // ================================================================
    // 5. MODAL DE E-MAILS
    // ================================================================
    const modal = document.getElementById('emailModal');
    const emailList = document.getElementById('emailList');
    const openModalBtn = document.getElementById('openEmailModalBtn');
    const closeModalBtn = document.getElementById('closeEmailModal');
    const closeModalBtn2 = document.getElementById('closeEmailModalBtn');
    const copyAllBtn = document.getElementById('copyAllEmails');

    function openEmailModal() {
      // Preencher lista
      emailList.innerHTML = '';
      artists.forEach((artist, idx) => {
        if (artist.email && artist.email.trim() !== '') {
          const li = document.createElement('li');
          const span = document.createElement('span');
          span.className = 'email-text';
          span.textContent = artist.email;
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-email-btn';
          copyBtn.textContent = 'Copiar';
          copyBtn.dataset.email = artist.email;
          copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const email = copyBtn.dataset.email;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(email).then(() => showToast('✅ E-mail copiado!'))
                .catch(() => fallbackCopy(email));
            } else {
              fallbackCopy(email);
            }
          });
          li.appendChild(span);
          li.appendChild(copyBtn);
          emailList.appendChild(li);
        }
      });
      modal.classList.add('active');
    }

    function closeEmailModal() {
      modal.classList.remove('active');
    }

    openModalBtn.addEventListener('click', openEmailModal);
    closeModalBtn.addEventListener('click', closeEmailModal);
    closeModalBtn2.addEventListener('click', closeEmailModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeEmailModal();
    });

    copyAllBtn.addEventListener('click', () => {
      const emails = artists.map(a => a.email).filter(e => e && e.trim() !== '');
      const text = emails.join('\n');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('✅ Todos os e-mails copiados!'))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    });

    // ================================================================
    // 6. Inicialização
    // ================================================================
    // Se quiser iniciar já logado (descomente para testes):
    // loginOverlay.classList.add('hidden');
    // appContainer.style.display = 'block';
    // initCarousel();
  </script>

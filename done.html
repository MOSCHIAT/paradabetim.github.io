        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f4f6fb;
            color: #1e1e2f;
            padding: 1.5rem;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ── Cabeçalho ── */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #2b2d6e, #1a1c3a);
            border-radius: 20px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        header h1 i {
            color: #f9d342;
        }

        .stats {
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.12);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .stats span {
            font-weight: 600;
        }

        /* ── Filtros ── */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            background: #fff;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            align-items: center;
        }

        .filters label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .filters input,
        .filters select {
            padding: 0.5rem 0.8rem;
            border: 1.5px solid #e0e4ee;
            border-radius: 10px;
            background: #fafbfc;
            font-size: 0.9rem;
            transition: 0.2s;
            min-width: 140px;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #2b2d6e;
            box-shadow: 0 0 0 3px rgba(43, 45, 110, 0.15);
        }

        .filters .clear-btn {
            background: #eef0f5;
            border: none;
            padding: 0.45rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #444;
            cursor: pointer;
            transition: 0.2s;
            margin-left: auto;
        }

        .filters .clear-btn:hover {
            background: #dde0e8;
            transform: scale(0.97);
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 1.2rem 1.4rem 1.4rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #edf0f7;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            border-color: #d0d6e8;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .card-header .nome {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1c3a;
            line-height: 1.3;
        }

        .card-header .nome-artistico {
            font-size: 0.9rem;
            font-weight: 500;
            color: #2b2d6e;
            background: #eef1ff;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            display: inline-block;
        }

        .badge-tipo {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            background: #eef0f5;
            color: #555;
            white-space: nowrap;
        }

        .badge-tipo.artista {
            background: #dbeafe;
            color: #1e4a8a;
        }

        .badge-tipo.voluntario {
            background: #d1fae5;
            color: #0b6e4f;
        }

        .badge-tipo.grupo {
            background: #fef3c7;
            color: #8a6d1f;
        }

        .badge-tipo.solo {
            background: #e0f2fe;
            color: #0e6b9e;
        }

        .card-body {
            flex: 1;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #2e2e44;
        }

        .card-body .field {
            display: flex;
            gap: 0.4rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid #f0f2f8;
        }

        .card-body .field:last-child {
            border-bottom: none;
        }

        .card-body .field .label {
            font-weight: 600;
            color: #555;
            min-width: 80px;
            flex-shrink: 0;
        }

        .card-body .field .value {
            word-break: break-word;
            color: #1a1c2e;
        }

        .card-body .field .value a {
            color: #2b2d6e;
            text-decoration: none;
            border-bottom: 1px dotted #b0b8d0;
        }

        .card-body .field .value a:hover {
            border-bottom: 1px solid #2b2d6e;
        }

        .card-body .bio {
            background: #f8f9fe;
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            margin: 0.4rem 0 0.6rem;
            font-size: 0.82rem;
            line-height: 1.5;
            color: #2e2e4a;
            max-height: 120px;
            overflow-y: auto;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            margin-top: 0.8rem;
            padding-top: 0.7rem;
            border-top: 1px solid #edf0f7;
            flex-wrap: wrap;
        }

        .btn-copy {
            background: #2b2d6e;
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-copy:hover {
            background: #1f2155;
            transform: scale(0.97);
        }

        .btn-copy.copied {
            background: #0f7b4a;
        }

        .btn-copy i {
            font-size: 0.8rem;
        }

        .btn-link {
            background: transparent;
            border: 1px solid #d0d6e8;
            color: #444;
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-link:hover {
            background: #f0f2f8;
            border-color: #b0b8d0;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a1c3a;
            color: #fff;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transform: translateY(120px);
            opacity: 0;
            transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            color: #7ddfb0;
            font-size: 1.1rem;
        }

        /* ── Empty ── */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
            color: #777;
            font-size: 1.1rem;
        }

        .empty i {
            font-size: 2.5rem;
            color: #ccc;
            display: block;
            margin-bottom: 0.8rem;
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            header h1 {
                justify-content: center;
                font-size: 1.3rem;
            }
            .stats {
                justify-content: center;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters .clear-btn {
                margin-left: 0;
            }
            .grid {
                grid-template-columns: 1fr;
            }

            }

            }
        }

        @media (min-width: 701px) and (max-width: 1024px) {

                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* scrollbar */
        .bio::-webkit-scrollbar {
            width: 4px;
        }
        .bio::-webkit-scrollbar-track {
            background: #eef0f5;
            border-radius: 8px;
        }
        .bio::-webkit-scrollbar-thumb {
            background: #c0c8dc;
            border-radius: 8px;
        }
    </style>
</head>

            const exclude = ['termos', '0', '1', '2'];
            const keys = Object.keys(entry).filter(k => !exclude.includes(k) && entry[k] !== undefined && entry[k] !== '' &&
                entry[k] !== null);

            // áreas para voluntário
            let areas = [];
            if (entry.tipo === 'voluntario') {
                if (entry['0']) areas.push(entry['0']);
                if (entry['1']) areas.push(entry['1']);
                if (entry['2']) areas.push(entry['2']);
                if (areas.length) {
                    lines.push('Áreas: ' + areas.join(', '));
                }
            }

            const order = ['nome', 'nomeArtistico', 'bio', 'cidade', 'genero', 'email', 'telefone', 'instagram',
                'spotify', 'youtube', 'tiktok', 'portfolioLink', 'musicas', 'nascimento', 'dataHora',
                'disponibilidade', 'tamanhoCamiseta', 'tempoApresentacao', 'documentos', 'tipo', 'tipoApresentacao'
            ];
            const sortedKeys = keys.sort((a, b) => {
                const ia = order.indexOf(a);
                const ib = order.indexOf(b);
                if (ia === -1 && ib === -1) return a.localeCompare(b);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });

            sortedKeys.forEach(k => {
                let val = entry[k];
                if (val === undefined || val === null || val === '') return;
                if (k === 'tipo' || k === 'tipoApresentacao') {
                    // já vamos adicionar no final
                }
                const label = labels[k] || k.charAt(0).toUpperCase() + k.slice(1);
                lines.push(`${label}: ${val}`);
            });

            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copiado!');
                if (btn) {
                    btn.classList.add('copied');
                    btn.innerHTML = '<i class="fas fa-check"></i> Copiado';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<i class="fas fa-copy"></i> Copiar';
                    }, 2000);
                }
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('Copiado!');
            });
        }

        // ── toast ──
        let toastTimeout;

        function showToast(msg) {
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ── filtros ──
        function filterData() {
            const search = searchInput.value.toLowerCase().trim();
            const city = cityFilter.value;
            const genre = genreFilter.value;
            const type = typeFilter.value;

            let filtered = data.filter(d => {
                // busca textual
                if (search) {
                    const searchable = [
                        d.nome, d.nomeArtistico, d.cidade, d.genero, d.bio, d.email, d.musicas
                    ].filter(Boolean).join(' ').toLowerCase();
                    if (!searchable.includes(search)) return false;
                }
                if (city && d.cidade !== city) return false;
                if (type && d.tipo !== type) return false;
                if (genre) {
                    // verifica se o gênero está no campo genero (pode ter vírgula)
                    const gen = d.genero || '';
                    const genres = gen.split(',').map(g => g.trim());
                    if (!genres.some(g => g === genre)) return false;
                }
                return true;
            });

            render(filtered);
        }

        // ── eventos ──
        searchInput.addEventListener('input', filterData);
        cityFilter.addEventListener('change', filterData);
        genreFilter.addEventListener('change', filterData);
        typeFilter.addEventListener('change', filterData);

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            cityFilter.value = '';
            genreFilter.value = '';
            typeFilter.value = '';
            filterData();
        });

        // ── init ──
        populateFilters();
        render(data);

        // ── keyboard shortcut: Ctrl+K foca no search ──
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });
    </script>

</body>
</html>
